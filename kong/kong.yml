_format_version: "3.0"

# 1. GLOBAL PLUGINS (Bật cho toàn bộ Gateway)
plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers: ["Content-Type", "apikey"]
      exposed_headers: ["Content-Type"]
      credentials: false
      max_age: 3600

# 2. SERVICES & ROUTES (Điều hướng traffic)
services:
  - name: order-api-service
    url: http://order-api:5001
    routes:
      - name: order-route
        paths: ["/orders"]
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: key-auth
        config:
          key_names: [apikey]

  - name: report-service
    url: http://report-service:5002
    routes:
      - name: report-route
        paths: ["/report"]
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: key-auth
        config:
          key_names: [apikey]

# 3. CONSUMERS (Định danh khách hàng được phép truy cập)
consumers:
  - username: dashboard-client
    keyauth_credentials:
      - key: noah-secret-key
