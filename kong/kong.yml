_format_version: "3.0"

plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      headers: ["Content-Type", "apikey"]
      exposed_headers: ["Content-Type"]
      credentials: false
      max_age: 3600

services:
  - name: order-api-service
    url: http://order-api:5001
    routes:
      - name: order-route
        paths: ["/orders"]
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local

  - name: report-service
    url: http://report-service:5002
    routes:
      - name: report-route
        paths: ["/report"]
        strip_path: true

consumers:
  - username: dashboard-client
    keyauth_credentials:
      - key: noah-secret-key
