version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: noah-mysql-1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Ho_Chi_Minh
    command: --default-time-zone="+07:00"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: noah-postgres-1
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: noah-rabbitmq-1
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kong:
    image: kong:3.4
    container_name: noah-kong-1
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      order-api:
        condition: service_started
      report-service:
        condition: service_started
    restart: unless-stopped

  legacy-adapter:
    build: ./legacy-adapter
    container_name: noah-legacy-adapter
    env_file: .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./legacy-adapter/input:/app/input
      - ./legacy-adapter/processed:/app/processed
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  order-api:
    build: ./order-api
    container_name: noah-order-api
    env_file: .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  order-worker:
    build: ./order-worker
    container_name: noah-order-worker
    env_file: .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  report-service:
    build: ./report-service
    container_name: noah-report-service
    env_file: .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: noah-dashboard
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped

volumes:
  mysql_data:
  pg_data:
