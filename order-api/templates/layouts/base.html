<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} – Noah Retail</title>
    
    <!-- Premium Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#1e293b', 950: '#0f172a' }
                    }
                }
            }
        }
    </script>

    <style>
        /* ── Notification Toast ─────────────────────────────── */
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes fadeOutRight {
            from { transform: translateX(0);    opacity: 1; }
            to   { transform: translateX(120%); opacity: 0; }
        }
        .notif-toast {
            animation: slideInRight 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
            will-change: transform, opacity;
        }
        .notif-toast.removing {
            animation: fadeOutRight 0.35s ease-in forwards;
        }
        @keyframes bellShake {
            0%,100% { transform: rotate(0deg); }
            20%      { transform: rotate(-18deg); }
            40%      { transform: rotate(18deg); }
            60%      { transform: rotate(-10deg); }
            80%      { transform: rotate(10deg); }
        }
        .bell-shake { animation: bellShake 0.6s ease; }
        @keyframes badgePop {
            0%   { transform: scale(0); }
            70%  { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .badge-pop { animation: badgePop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 font-['Inter'] transition-all duration-300">

    {% include 'components/sidebar.html' %}

    <!-- Main Content Wrapper -->
    <main class="main-content min-h-screen transition-all duration-300">
        <!-- Top Navigation / Search -->
        <header class="h-16 border-b border-slate-200 bg-white/80 backdrop-blur-md flex items-center justify-between px-8 sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <nav class="flex items-center text-sm text-slate-500 font-medium space-x-2">
                    <span class="hover:text-indigo-600 cursor-pointer text-xs">NOAH RETAIL</span>
                    <span class="text-slate-300">/</span>
                    <span class="text-slate-900 text-xs font-bold">{{ current_page | capitalize }}</span>
                </nav>
            </div>
            
            <div class="flex items-center gap-6">
                <!-- Status Badges -->
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-1.5 px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full border border-emerald-100">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[10px] font-bold uppercase tracking-wider">Live Stream</span>
                    </div>
                </div>

                <div class="h-8 w-[1px] bg-slate-200"></div>

                <!-- 🔔 Notification Bell -->
                <button id="notif-bell-btn" class="relative p-2 hover:bg-indigo-50 rounded-full transition-colors text-slate-500 hover:text-indigo-600" title="Thông báo đơn hàng">
                    <i id="notif-bell-icon" data-lucide="bell" class="w-5 h-5"></i>
                    <span id="notif-badge" class="hidden absolute -top-0.5 -right-0.5 w-4 h-4 bg-rose-500 text-white text-[9px] font-black rounded-full flex items-center justify-center leading-none">0</span>
                </button>
                
                <!-- Quick Actions -->
                <button onclick="location.reload()" class="p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-500" title="Refresh Page">
                    <i data-lucide="rotate-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Dynamic Content -->
        <div class="p-8 max-w-[1600px] mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Global Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col items-end gap-3"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>lucide.createIcons();</script>

    <!-- ── Module 3: Realtime Notification System ───────────────── -->
    <script>
    (function () {
        let unreadCount = 0;
        const badge     = document.getElementById('notif-badge');
        const bellIcon  = document.getElementById('notif-bell-icon');
        const container = document.getElementById('toast-container');

        function shakeBell() {
            bellIcon.classList.remove('bell-shake');
            void bellIcon.offsetWidth; // reflow trick
            bellIcon.classList.add('bell-shake');
            setTimeout(() => bellIcon.classList.remove('bell-shake'), 700);
        }

        function updateBadge() {
            badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
            if (unreadCount > 0) {
                badge.classList.remove('hidden');
                badge.classList.add('flex', 'badge-pop');
            } else {
                badge.classList.add('hidden');
                badge.classList.remove('flex', 'badge-pop');
            }
        }

        // Click bell → reset badge
        document.getElementById('notif-bell-btn').addEventListener('click', () => {
            unreadCount = 0;
            updateBadge();
        });

        function showNotifToast(data) {
            const toast = document.createElement('div');
            toast.className = [
                'notif-toast',
                'w-[340px] bg-white rounded-2xl shadow-2xl border border-slate-100',
                'overflow-hidden cursor-pointer select-none',
            ].join(' ');

            const priceStr = Number(data.total || 0).toLocaleString('vi-VN');
            const shortId  = (data.order_id || '').substring(0, 12);

            toast.innerHTML = `
                <div class="flex items-stretch">
                    <div class="w-1.5 flex-shrink-0 bg-gradient-to-b from-indigo-500 to-emerald-500"></div>
                    <div class="flex-1 p-4">
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-2">
                                <span class="text-base">✅</span>
                                <span class="text-[11px] font-extrabold text-emerald-600 uppercase tracking-wider">Thanh toán thành công</span>
                            </div>
                            <span class="text-[10px] text-slate-400 font-mono">${data.created_at || ''}</span>
                        </div>
                        <p class="text-[13px] font-bold text-slate-800 leading-snug">
                            Đơn hàng <span class="font-mono text-indigo-600">#${shortId}</span>
                        </p>
                        <p class="text-[12px] text-slate-500 mt-0.5">
                            User <strong class="text-slate-700">${data.user_id}</strong> &nbsp;·&nbsp;
                            <span class="font-black text-slate-900">${priceStr}₫</span>
                        </p>
                        <div class="mt-3 h-0.5 bg-slate-100 rounded-full overflow-hidden">
                            <div class="notif-progress h-full bg-gradient-to-r from-indigo-400 to-emerald-400 rounded-full" style="width:100%;transition:width 6s linear;"></div>
                        </div>
                    </div>
                </div>
            `;

            container.prepend(toast);

            // Trigger progress bar shrink after paint
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const bar = toast.querySelector('.notif-progress');
                    if (bar) bar.style.width = '0%';
                });
            });

            toast.addEventListener('click', () => removeToast(toast));
            const timer = setTimeout(() => removeToast(toast), 6000);
            toast._timer = timer;

            // Keep max 5 toasts
            const all = container.querySelectorAll('.notif-toast');
            if (all.length > 5) removeToast(all[all.length - 1]);
        }

        function removeToast(toast) {
            if (!toast || !toast.parentNode) return;
            if (toast._timer) clearTimeout(toast._timer);
            toast.classList.add('removing');
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 350);
        }

        // ── SSE Connection ───────────────────────────────────────
        function connectSSE() {
            const sse = new EventSource('/api/stream/notifications');

            sse.onmessage = function (e) {
                try {
                    const data = JSON.parse(e.data);
                    showNotifToast(data);
                    unreadCount++;
                    updateBadge();
                    shakeBell();
                } catch (_) {}
            };

            sse.onerror = function () {
                sse.close();
                setTimeout(connectSSE, 5000);
            };
        }

        connectSSE();
    })();
    </script>
    <!-- ── END Module 3 ──────────────────────────────────────────── -->
</body>
</html>
